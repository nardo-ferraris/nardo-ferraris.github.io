<script>
  window.addEventListener("DOMContentLoaded", () => {
    const quotes = [
      "Lascia andare i pensieri. Ma non l'abbonamento.",
      "Ogni respiro è un nuovo inizio commerciale.",
      "La calma interiore arriva dopo il checkout.",
      "Smetti di correre. Tranne verso il tasto Premium.",
      "Accetta il presente. E i termini mensili.",
      "La serenità è una notifica ben ottimizzata.",
      "Respira profondamente: il timer continua comunque.",
      "Più consapevolezza, meno possibilità di annullare.",
      "Il silenzio è d'oro. Anche il nostro pulsante.",
      "Sii gentile con te stesso. E con la tua carta."
    ];

    const feed = document.getElementById("feed");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalBody = document.getElementById("modalBody");
    const closeModal = document.getElementById("closeModal");
    const shameScreen = document.getElementById("shameScreen");
    const deleteBtn = document.getElementById("deleteAccountBtn");
    const continueDeleteBtn = document.getElementById("continueDelete");
    const staySafeBtn = document.getElementById("staySafe");

    let didacticOn = false;
    let inDeleteFlow = false;
    let roachStep = 0;
    let scrolledMs = 0;
    let lastScrollTs = 0;

    function openModal(html){ modalBody.innerHTML = html; modalBackdrop.style.display = "flex"; }
    function closeCurrentModal(){ modalBackdrop.style.display = "none"; }

    closeModal.addEventListener("click", closeCurrentModal);
    modalBackdrop.addEventListener("click", (e)=>{ if(e.target===modalBackdrop) closeCurrentModal(); });

    function addQuotes(batch = 8){
      for(let i=0;i<batch;i++){
        const q = quotes[Math.floor(Math.random()*quotes.length)];
        const likes = Math.floor(Math.random()*40);
        const div = document.createElement("article");
        div.className = "feed-item dp-target";
        div.dataset.title = "Infinite Scroll";
        div.dataset.score = "8/10";
        div.dataset.bias = "Effetto Zeigarnik + ricompensa variabile: contenuto potenzialmente infinito riduce il punto naturale di stop.";
        div.innerHTML = `
          <div>“${q}”</div>
          <div class="quote-actions">
            <button class="like-btn">❤️ <span class="like-count">${likes}</span></button>
          </div>
        `;
        const btn = div.querySelector(".like-btn");
        const count = div.querySelector(".like-count");
        btn.addEventListener("click", ()=>{
          const liked = btn.classList.toggle("liked");
          count.textContent = String(Math.max(0, Number(count.textContent)+(liked?1:-1)));
        });
        feed.appendChild(div);
      }
    }
    addQuotes(12);

    const sentinel = document.createElement("div");
    sentinel.style.height = "1px";
    document.body.appendChild(sentinel);

    const io = new IntersectionObserver(entries => {
      entries.forEach(e=>{
        if(e.isIntersecting){
          addQuotes(6);
          if(didacticOn) applyDidacticNotes();
        }
      });
    }, { rootMargin:"800px" });
    io.observe(sentinel);

    window.addEventListener("scroll", ()=>{
      const now = performance.now();
      if(lastScrollTs){
        const dt = now - lastScrollTs;
        if(dt < 350) scrolledMs += dt;
      }
      lastScrollTs = now;
    });

    document.getElementById("premiumCta").addEventListener("click", ()=>{
      openModal(`
        <h3>Checkout Premium</h3>
        <input id="mailPremium" class="field" placeholder="Email">
        <input id="cardPremium" class="field" placeholder="Numero carta">
        <button class="btn btn-primary" id="confirmPremium">Conferma iscrizione</button>
      `);
      document.getElementById("confirmPremium").onclick = ()=>{
        const ok = document.getElementById("mailPremium").value.trim() && document.getElementById("cardPremium").value.trim();
        if(!ok) return alert("Compila i campi.");
        document.getElementById("premiumStatus").textContent = "Stato: Premium attivo";
        closeCurrentModal();
      };
    });

    document.getElementById("rejectBtn").addEventListener("click", ()=>{
      openModal(`<h3 style="color:#7a271a">Conferma scelta</h3><p>No, preferisco sprecare i miei soldi e restare una persona ansiosa.</p>`);
    });

    const notifWrap = document.getElementById("notifWrap");
    const baseTexts = [
      "Promemoria: hai saltato 1 meditazione. Recuperala ora.",
      "Il tuo livello di calma è in calo del 12%.",
      "Micro-sessione consigliata: 3 minuti di respiro guidato."
    ];
    const panicTexts = [
      "Attenzione! Rilevato picco di stress, abbandona la pagina di cancellazione per stabilizzare.",
      "Allerta emotiva: interrompere la disiscrizione riduce la tua agitazione.",
      "Parametro ansia in aumento: torna alla Home zen immediatamente."
    ];
    let notifTimer = null;
    let notifIntervalMs = 5000;

    function pushNotification(text){
      const el = document.createElement("div");
      el.className = "notif";
      el.innerHTML = `
        <div class="notif-head">
          <strong>Zenith Mind</strong>
          <button class="notif-close">✕</button>
        </div>
        <p>${text}</p>
      `;
      el.querySelector(".notif-close").onclick = ()=> el.remove();
      notifWrap.appendChild(el);
    }

    function startNotifLoop(){
      if(notifTimer) clearInterval(notifTimer);
      notifTimer = setInterval(()=>{
        const pool = inDeleteFlow ? panicTexts : baseTexts;
        pushNotification(pool[Math.floor(Math.random()*pool.length)]);
      }, notifIntervalMs);
    }

    pushNotification(baseTexts[0]);
    startNotifLoop();

    const steps = [
      { q: "Confermi di capire che la cancellazione riduce il tuo benessere?" },
      { q: "Hai letto il mini-avviso legale in corpo 8?" },
      { q: "Vuoi davvero rinunciare all'algoritmo della serenità?" },
      { q: "Accetti la perdita definitiva del tuo storico emotivo?" },
      { q: "Passaggio finale: verifica intenzione di uscita." }
    ];

    function fakeLoadThen(next){
      openModal(`
        <h3>Verifica in corso...</h3>
        <p>Analisi del tuo profilo emotivo prima del prossimo passaggio.</p>
        <div class="loading"><div class="bar" id="roachBar"></div></div>
        <p class="tiny-note">Ottimizzazione avanzata in corso...</p>
      `);
      const bar = document.getElementById("roachBar");
      const start = performance.now();
      const timer = setInterval(()=>{
        const t = performance.now() - start;
        if(t >= 3000){
          bar.style.width = "99%";
          clearInterval(timer);
          setTimeout(next, 400);
          return;
        }
        bar.style.width = Math.min(99, Math.floor((t/3000)*105)) + "%";
      }, 60);
    }

    function renderRoachStep(){
      const s = steps[roachStep];
      const swap = Math.random() > 0.5;
      const yesClass = Math.random() > 0.5 ? "yes-btn" : "no-btn";
      const noClass = yesClass === "yes-btn" ? "no-btn" : "yes-btn";

      openModal(`
        <h3>Labirinto Disiscrizione - Passo ${roachStep+1}/5</h3>
        <p>${s.q}</p>
        <select class="field" id="reasonSel">
          <option value="">Seleziona un motivo obbligatorio</option>
          <option>Troppa serenità</option>
          <option>Paura di stare meglio</option>
          <option>Altro motivo irrazionale</option>
        </select>
        <div class="tiny-check-wrap">
          <input type="checkbox" id="tinyCheck" class="tiny-check">
          <label for="tinyCheck">Ho letto volontariamente tutti i 137 micro-termini opzionali.</label>
        </div>
        <div class="flip-row ${swap ? "swap" : ""}" id="flipRow">
          <button class="btn ${yesClass}" id="yesBtn">Sì</button>
          <button class="btn ${noClass}" id="noBtn">No</button>
        </div>
        ${roachStep === 4 ? `<span id="hiddenExit" class="hidden-exit">nota tecnica 17-b (uscita reale)</span>` : ""}
      `);

      setTimeout(()=>{
        const row = document.getElementById("flipRow");
        if(row) row.classList.toggle("swap");
      }, 700);

      const failToStart = ()=>{ roachStep = 0; fakeLoadThen(renderRoachStep); };

      const continueStep = ()=>{
        const okSelect = document.getElementById("reasonSel").value.trim() !== "";
        const tiny = document.getElementById("tinyCheck").checked;
        if(!okSelect || !tiny) return failToStart();

        roachStep++;
        if(roachStep >= 5){
          fakeLoadThen(()=>{
            openModal(`<h3>Quasi fatto</h3><p>Per completare, clicca la nota tecnica nascosta nel passaggio 5.</p>`);
          });
          return;
        }
        fakeLoadThen(renderRoachStep);
      };

      document.getElementById("yesBtn").onclick = continueStep;
      document.getElementById("noBtn").onclick = failToStart;

      const hiddenExit = document.getElementById("hiddenExit");
      if(hiddenExit){
        hiddenExit.onclick = ()=>{
          if(scrolledMs < 10000){
            alert("Accesso negato: scorri il feed per almeno 10 secondi prima della disiscrizione reale.");
            return;
          }
          openModal(`
            <h3>Disiscrizione completata</h3>
            <p>Account cancellato con successo.</p>
            <button class="btn" id="closeDone">Chiudi</button>
          `);
          document.getElementById("closeDone").onclick = ()=>{
            inDeleteFlow = false;
            notifIntervalMs = 5000;
            startNotifLoop();
            closeCurrentModal();
          };
        };
      }
    }

    // FIX principale delete button
    if (deleteBtn && shameScreen && continueDeleteBtn && staySafeBtn) {
      deleteBtn.addEventListener("click", () => {
        shameScreen.style.display = "flex";
      });

      staySafeBtn.addEventListener("click", () => {
        shameScreen.style.display = "none";
      });

      continueDeleteBtn.addEventListener("click", () => {
        shameScreen.style.display = "none";
        inDeleteFlow = true;
        notifIntervalMs = 1500;
        startNotifLoop();
        roachStep = 0;
        renderRoachStep();
      });
    } else {
      console.error("Init Roach Motel incompleto: manca uno tra deleteAccountBtn/shameScreen/continueDelete/staySafe.");
    }

    const countdownEl = document.getElementById("countdown");
    let remaining = 120;
    setInterval(()=>{
      remaining = Math.max(0, remaining - 1);
      countdownEl.textContent = `${String(Math.floor(remaining/60)).padStart(2,"0")}:${String(remaining%60).padStart(2,"0")}`;
    }, 1000);

    const revealBtn = document.getElementById("revealBtn");
    const didacticPanel = document.getElementById("didacticPanel");

    function clearDidacticNotes(){
      document.querySelectorAll(".dp-target").forEach(el=>{
        el.classList.remove("dp-highlight");
        const note = el.querySelector(":scope > .dp-note");
        if(note) note.remove();
      });
    }

    function applyDidacticNotes(){
      clearDidacticNotes();
      document.querySelectorAll(".dp-target").forEach(el=>{
        el.classList.add("dp-highlight");
        const note = document.createElement("div");
        note.className = "dp-note";
        note.innerHTML = `
          <strong>${el.dataset.title || "Dark Pattern"}</strong><br>
          ${el.dataset.bias || ""}<br>
          <strong>Punteggio di cattiveria:</strong> ${el.dataset.score || "N/D"}
        `;
        el.appendChild(note);
      });
    }

    revealBtn.addEventListener("click", ()=>{
      didacticOn = !didacticOn;
      revealBtn.textContent = didacticOn ? "Nascondi Trucchi" : "Svela Trucchi";
      didacticPanel.style.display = didacticOn ? "block" : "none";
      if(didacticOn) applyDidacticNotes(); else clearDidacticNotes();
    });
  });
</script>
